<body class="bg-background text-on-background font-body-md min-h-screen pb-20 md:pb-0">
<!-- Sidebar -->
<aside class="hidden md:flex fixed h-full w-[280px] left-0 top-0 border-r border-outline-variant bg-surface flex-col py-lg z-50" id="main-sidebar">
<div class="px-md mb-xl flex items-center gap-sm">
<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary">school</span>
</div>
<div>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Kwara Innovation Lab</h1>
<p class="text-label-sm font-label-sm text-on-surface-variant">Student Portal</p>
</div>
</div>
<nav class="flex-1 space-y-1">
<a class="flex items-center gap-md px-md py-sm text-primary font-bold border-l-4 border-secondary-container bg-surface-container-low transition-all duration-200" href="student-dashboard.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</a>
<a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-colors" href="student-assignments.html">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-md text-label-md">Assignments</span>
</a>
<a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-colors" href="student-attendance.html">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Attendance</span>
</a>
<button id="logoutBtn" class="flex items-center gap-md px-md py-sm text-error hover:bg-error-container/20 transition-colors w-full rounded-lg mt-sm">
  <span class="material-symbols-outlined">logout</span>
  <span class="font-label-md text-label-md">Logout</span>
</button>
</nav>
<div class="px-md pt-md border-t border-outline-variant">
<button id="logoutBtn" class="flex items-center gap-md px-md py-sm text-error hover:bg-error-container/20 transition-colors w-full rounded-lg">
<span class="material-symbols-outlined">logout</span>
<span class="font-label-md text-label-md">Logout</span>
</button>
</div>
</aside>

<!-- Main Content -->
<main class="md:ml-[280px] min-h-screen">
<header class="sticky top-0 w-full z-40 bg-surface-bright border-b border-outline-variant px-lg h-20 flex justify-between items-center md:px-xl glass-header">
<div class="flex items-center gap-md">
<button class="md:hidden hover:bg-surface-container rounded-full p-2">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h2 class="font-headline-md text-headline-md text-primary font-bold">My Assignments</h2>
</div>
</header>

<div class="p-md md:p-xl max-w-container-max mx-auto space-y-lg">
<!-- Stats -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-md">
<div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
<p class="text-on-surface-variant font-label-md mb-1">Total</p>
<p class="font-headline-md text-headline-md" id="totalCount">—</p>
</div>
<div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
<p class="text-on-surface-variant font-label-md mb-1">Pending</p>
<p class="font-headline-md text-headline-md text-secondary" id="pendingCount">—</p>
</div>
<div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
<p class="text-on-surface-variant font-label-md mb-1">Submitted</p>
<p class="font-headline-md text-headline-md text-primary" id="submittedCount">—</p>
</div>
<div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
<p class="text-on-surface-variant font-label-md mb-1">Graded</p>
<p class="font-headline-md text-headline-md text-green-600" id="gradedCount">—</p>
</div>
</div>

<!-- Assignments List -->
<div id="assignmentsList" class="space-y-md"></div>
</div>
</main>

<!-- Bottom Nav (Mobile) -->
<nav class="fixed bottom-0 w-full md:hidden rounded-t-xl z-50 bg-surface border-t border-outline-variant shadow-lg flex justify-around items-center h-16 px-4 pb-safe">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1" href="student-dashboard.html">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-[10px] mt-0.5">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary-fixed-dim bg-primary-container rounded-xl px-4 py-1" href="student-assignments.html">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-sm text-[10px] mt-0.5">Tasks</span>
</a>
</nav>

<!-- Submit Assignment Modal -->
<div id="submitModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-md">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-xl">
    <div class="flex justify-between items-center mb-lg">
      <h3 class="font-headline-sm text-headline-sm text-primary">Submit Assignment</h3>
      <button onclick="document.getElementById('submitModal').classList.add('hidden')" class="p-2 hover:bg-surface-container rounded-full">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <p id="submitAssignTitle" class="font-label-md text-on-surface-variant mb-md">—</p>
    <form id="submitForm" onsubmit="handleSubmit(event)" class="space-y-md">
      <input type="hidden" id="submitAssignId"/>
      <div>
        <label class="font-label-md text-label-md text-on-surface block mb-xs">Submission Link or Notes</label>
        <textarea id="submitContent" required rows="4" class="w-full px-md py-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none font-body-sm" placeholder="https://github.com/you/project or your notes"></textarea>
      </div>
      <div class="flex gap-md pt-sm">
        <button type="button" onclick="document.getElementById('submitModal').classList.add('hidden')" class="flex-1 h-11 border border-outline-variant rounded-lg font-label-md text-on-surface-variant hover:bg-surface-container">
          Cancel
        </button>
        <button type="submit" id="submitBtn" class="flex-1 h-11 bg-primary text-on-primary rounded-lg font-label-md hover:opacity-90">
          Submit
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  const API_URL = "https://kwil-management-system-backend.onrender.com/api";
  const getToken = () => localStorage.getItem("kil_token");
  const getUser = () => JSON.parse(localStorage.getItem("kil_user"));

  const user = getUser();
  const token = getToken();
  if (!token || !user || user.role !== "STUDENT") {
    window.location.href = "index.html";
  }

  let allAssignments = [];

  async function loadAssignments() {
    try {
      const res = await fetch(`${API_URL}/student/assignments`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json();
      allAssignments = data.assignments || [];
      updateStats(allAssignments);
      renderAssignments(allAssignments);
    } catch (err) {
      console.error("Failed to load assignments:", err);
    }
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  }

  function getMySubmission(assignment) {
    return assignment.submissions && assignment.submissions[0] ? assignment.submissions[0] : null;
  }

  function updateStats(assignments) {
    let pending = 0, submitted = 0, graded = 0;
    assignments.forEach(a => {
      const sub = getMySubmission(a);
      if (!sub) pending++;
      else if (sub.status === "GRADED") graded++;
      else submitted++;
    });

    document.getElementById('totalCount').textContent = assignments.length;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('submittedCount').textContent = submitted;
    document.getElementById('gradedCount').textContent = graded;
  }

  function renderAssignments(assignments) {
    const container = document.getElementById('assignmentsList');
    if (!assignments.length) {
      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant p-xl text-center">
          <p class="text-on-surface-variant font-body-sm">No assignments yet. Check back soon!</p>
        </div>`;
      return;
    }

    container.innerHTML = assignments.map(a => {
      const sub = getMySubmission(a);
      const isPastDue = new Date(a.dueDate) < new Date();
      const instructorName = a.instructor?.user?.fullName || "Instructor";

      let statusBadge, actionButton;

      if (!sub) {
        statusBadge = `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase ${isPastDue ? 'bg-error-container text-on-error-container' : 'bg-secondary-fixed text-on-secondary-fixed-variant'}">${isPastDue ? 'Overdue' : 'Not Submitted'}</span>`;
        actionButton = `<button onclick='openSubmitModal(${JSON.stringify({ id: a.id, title: a.title }).replace(/'/g, "&apos;")})' class="w-full py-sm bg-primary text-on-primary rounded-xl font-label-md hover:opacity-90 transition-colors">Submit Work</button>`;
      } else if (sub.status === "GRADED") {
        statusBadge = `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase bg-green-100 text-green-700">Graded: ${sub.grade}/100</span>`;
        actionButton = sub.feedback
          ? `<div class="p-md bg-surface-container-low rounded-lg"><p class="text-label-sm font-bold text-on-surface-variant mb-xs">Instructor Feedback</p><p class="text-body-sm text-on-surface">${sub.feedback}</p></div>`
          : "";
      } else {
        statusBadge = `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase bg-primary-fixed text-on-primary-fixed-variant">Submitted • Awaiting Grade</span>`;
        actionButton = `<button onclick='openSubmitModal(${JSON.stringify({ id: a.id, title: a.title }).replace(/'/g, "&apos;")})' class="w-full py-sm border border-outline-variant text-on-surface rounded-xl font-label-md hover:bg-surface-container transition-colors">Edit Submission</button>`;
      }

      return `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant p-lg">
          <div class="flex justify-between items-start mb-sm">
            <div>
              <h3 class="font-headline-sm text-headline-sm text-primary">${a.title}</h3>
              <p class="text-body-sm text-on-surface-variant">${a.course} • Posted by ${instructorName}</p>
            </div>
            ${statusBadge}
          </div>
          <p class="text-body-sm text-on-surface-variant mb-md">${a.description}</p>
          <p class="text-label-sm text-outline mb-md">Due: ${formatDate(a.dueDate)}</p>
          ${actionButton}
        </div>
      `;
    }).join("");
  }

  function openSubmitModal(data) {
    document.getElementById('submitAssignId').value = data.id;
    document.getElementById('submitAssignTitle').textContent = data.title;
    document.getElementById('submitModal').classList.remove('hidden');
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const id = document.getElementById('submitAssignId').value;
    const content = document.getElementById('submitContent').value;
    const btn = document.getElementById('submitBtn');

    btn.disabled = true;
    btn.textContent = "Submitting...";

    try {
      const res = await fetch(`${API_URL}/student/assignments/${id}/submit`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ content }),
      });
      if (res.ok) {
        document.getElementById('submitModal').classList.add('hidden');
        document.getElementById('submitForm').reset();
        loadAssignments();
      } else {
        const data = await res.json();
        alert(data.message || "Failed to submit");
      }
    } catch (err) {
      alert("Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit";
    }
  }

  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem("kil_token");
    localStorage.removeItem("kil_user");
    window.location.href = "index.html";
  });

  const menuBtn = document.querySelector('header button');
  const sidebar = document.getElementById('main-sidebar');
  menuBtn?.addEventListener('click', () => {
    sidebar.classList.toggle('hidden');
    sidebar.classList.toggle('flex');
  });

  loadAssignments();
</script>
