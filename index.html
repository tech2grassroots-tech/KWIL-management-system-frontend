<body class="min-h-screen flex items-center justify-center p-md">
<!-- Subtle Background Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-surface-container rounded-full opacity-50 blur-3xl"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-surface-variant rounded-full opacity-30 blur-3xl"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[440px] relative z-10 animate-fade-in-up">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg mb-md">
<img src="/frontend-kwil/images/background.png" class=" text-4xl bg-white" data-icon="school">
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs tracking-tight">Kwara Innovation Lab</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Access your learning portal</p>
</div>
<!-- Login Card -->
<div class="login-card bg-surface-container-lowest border border-outline-variant/30 rounded-2xl p-xl">
<form class="space-y-lg" id="loginForm" onsubmit="handleLogin(event)">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface block" for="email">Work Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-12 pl-12 pr-md bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/50" id="email" placeholder="admin@kil.edu.ng" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface block" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-12 pr-xl bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all font-body-md text-on-surface placeholder:text-outline/50" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-sm">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Keep me signed in</label>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 bg-primary text-surface font-label-md text-label-md rounded-lg hover:bg-primary-container hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-sm group" id="submitBtn" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Bottom Divider & SSO Placeholder -->

</div>
</div>

</footer>

    <script>
  const API_URL = "https://kwil-management-system-backend.onrender.com/api";

  function togglePassword() {
    const pwdInput = document.getElementById('password');
    const pwdIcon = document.getElementById('passwordIcon');
    if (pwdInput.type === 'password') {
      pwdInput.type = 'text';
      pwdIcon.innerText = 'visibility_off';
    } else {
      pwdInput.type = 'password';
      pwdIcon.innerText = 'visibility';
    }
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const originalContent = btn.innerHTML;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Loading state
    btn.disabled = true;
    btn.innerHTML = `
      <div class="w-5 h-5 border-2 border-surface/30 border-t-surface rounded-full animate-spin"></div>
      <span>Verifying...</span>
    `;

    try {
      const res = await fetch(`${API_URL}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.message || "Login failed");
        btn.innerHTML = originalContent;
        btn.disabled = false;
        return;
      }

      // Save token and user to localStorage
      localStorage.setItem("kil_token", data.token);
      localStorage.setItem("kil_user", JSON.stringify(data.user));

      // Redirect based on role
      const role = data.user.role;
      if (role === "ADMIN") {
        window.location.href = "admin-dashboard.html";
      } else if (role === "INSTRUCTOR") {
        window.location.href = "instructor-dashboard.html";
      } else if (role === "STUDENT") {
        window.location.href = "student-dashboard.html";
      }

    } catch (err) {
      showError("Network error. Please try again.");
      btn.innerHTML = originalContent;
      btn.disabled = false;
    }
  }

  function showError(message) {
    // Remove existing error if any
    const existing = document.getElementById('errorMsg');
    if (existing) existing.remove();

    const error = document.createElement('div');
    error.id = 'errorMsg';
    error.className = 'w-full p-md bg-error-container text-on-error-container rounded-lg font-body-sm text-body-sm flex items-center gap-sm';
    error.innerHTML = `<span class="material-symbols-outlined text-sm">error</span>${message}`;

    const form = document.getElementById('loginForm');
    form.prepend(error);
  }

  // Card tilt effect
  const card = document.querySelector('.login-card');
  document.addEventListener('mousemove', (e) => {
    const x = e.clientX / window.innerWidth - 0.5;
    const y = e.clientY / window.innerHeight - 0.5;
    card.style.transform = `perspective(1000px) rotateX(${y * 2}deg) rotateY(${x * 2}deg)`;
  });
</script>
