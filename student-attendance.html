        spacing: { "2xl": "48px","3xl": "64px","xl": "32px","base": "4px","gutter": "24px","md": "16px","xs": "4px","container-max": "1440px","lg": "24px","sm": "8px" },

          "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
          "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

          "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],

<style>

  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #c5c6cd; border-radius: 10px; }

<body class="bg-background text-on-background font-body-md min-h-screen pb-20 md:pb-0">

<!-- Sidebar -->
<aside class="hidden md:flex fixed h-full w-[280px] left-0 top-0 border-r border-outline-variant bg-surface flex-col py-lg z-50" id="main-sidebar">
  <div class="px-md mb-xl flex items-center gap-sm">
    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
      <span class="material-symbols-outlined text-on-primary">school</span>
    </div>
    <div>
      <h1 class="font-headline-sm text-headline-sm font-bold text-primary">Kwara Innovation Lab</h1>
      <p class="text-label-sm font-label-sm text-on-surface-variant">Student Portal</p>
    </div>
  </div>
  <nav class="flex-1 space-y-1">
<a class="flex items-center gap-md px-md py-sm text-primary font-bold border-l-4 border-secondary-container bg-surface-container-low transition-all duration-200" href="student-dashboard.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</a>
<a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-colors" href="student-assignments.html">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-md text-label-md">Assignments</span>
</a>
<a class="flex items-center gap-md px-md py-sm text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-colors" href="student-attendance.html">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Attendance</span>
</a>
<button id="logoutBtn" class="flex items-center gap-md px-md py-sm text-error hover:bg-error-container/20 transition-colors w-full rounded-lg mt-sm">
  <span class="material-symbols-outlined">logout</span>
  <span class="font-label-md text-label-md">Logout</span>
</button>
</nav>
  <div class="px-md pt-md border-t border-outline-variant">
    <button id="logoutBtn" class="flex items-center gap-md px-md py-sm text-error hover:bg-error-container/20 transition-colors w-full rounded-lg">
      <span class="material-symbols-outlined">logout</span>
      <span class="font-label-md text-label-md">Logout</span>
    </button>
  </div>
</aside>

<!-- Main -->
<main class="md:ml-[280px] min-h-screen">
  <header class="sticky top-0 w-full z-40 bg-surface-bright border-b border-outline-variant px-lg h-20 flex justify-between items-center">
    <div class="flex items-center gap-md">
      <button class="md:hidden hover:bg-surface-container rounded-full p-2">
        <span class="material-symbols-outlined text-primary">menu</span>
      </button>
      <h2 class="font-headline-md text-headline-md text-primary font-bold">My Attendance</h2>
    </div>
  </header>

  <div class="p-md md:p-xl max-w-4xl mx-auto space-y-lg">
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-md">
      <div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
        <p class="text-on-surface-variant font-label-md mb-1">Total Sessions</p>
        <p class="font-headline-md text-headline-md" id="totalSessions">—</p>
      </div>
      <div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
        <p class="text-on-surface-variant font-label-md mb-1">Marked</p>
        <p class="font-headline-md text-headline-md text-green-600" id="markedCount">—</p>
      </div>
      <div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
        <p class="text-on-surface-variant font-label-md mb-1">Verified Present</p>
        <p class="font-headline-md text-headline-md text-primary" id="presentCount">—</p>
      </div>
      <div class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant">
        <p class="text-on-surface-variant font-label-md mb-1">Unmarked</p>
        <p class="font-headline-md text-headline-md text-secondary" id="unmarkedCount">—</p>
      </div>
    </div>

    <!-- Sessions list -->
    <div id="sessionsList" class="space-y-md"></div>
  </div>
</main>

<!-- Mobile bottom nav -->
<nav class="fixed bottom-0 w-full md:hidden rounded-t-xl z-50 bg-surface border-t border-outline-variant shadow-lg flex justify-around items-center h-16 px-4">
  <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1" href="student-dashboard.html">
    <span class="material-symbols-outlined">home</span>
    <span class="font-label-sm text-[10px]">Home</span>
  </a>
  <a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1" href="student-assignments.html">
    <span class="material-symbols-outlined">assignment</span>
    <span class="font-label-sm text-[10px]">Tasks</span>
  </a>
  <a class="flex flex-col items-center justify-center text-secondary-fixed-dim bg-primary-container rounded-xl px-4 py-1" href="student-attendance.html">
    <span class="material-symbols-outlined">fact_check</span>
    <span class="font-label-sm text-[10px]">Attendance</span>
  </a>
</nav>

<!-- Mark Attendance Modal -->
<div id="markModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-md">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-xl">
    <div class="flex justify-between items-center mb-lg">
      <h3 class="font-headline-sm text-headline-sm text-primary">Mark Attendance</h3>
      <button onclick="document.getElementById('markModal').classList.add('hidden')" class="p-2 hover:bg-surface-container rounded-full">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <p id="markSessionTitle" class="font-label-md text-on-surface-variant mb-md">—</p>
    <form id="markForm" onsubmit="submitAttendance(event)" class="space-y-md">
      <input type="hidden" id="markSessionId"/>
      <div>
        <label class="font-label-md text-label-md text-on-surface block mb-xs">Note (optional)</label>
        <textarea id="markNote" rows="3" class="w-full px-md py-sm border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary outline-none font-body-sm" placeholder="e.g. I was present and participated actively"></textarea>
      </div>
      <div class="flex gap-md pt-sm">
        <button type="button" onclick="document.getElementById('markModal').classList.add('hidden')" class="flex-1 h-11 border border-outline-variant rounded-lg font-label-md text-on-surface-variant hover:bg-surface-container">Cancel</button>
        <button type="submit" id="markBtn" class="flex-1 h-11 bg-primary text-on-primary rounded-lg font-label-md hover:opacity-90">Mark Present</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API_URL = "https://kwil-management-system-backend.onrender.com/api";
  const getToken = () => localStorage.getItem("kil_token");
  const getUser = () => JSON.parse(localStorage.getItem("kil_user"));

  const user = getUser();
  const token = getToken();
  if (!token || !user || user.role !== "STUDENT") {
    window.location.href = "index.html";
  }

  async function loadSessions() {
    try {
      const res = await fetch(`${API_URL}/attendance/student/sessions`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json();
      const sessions = data.sessions || [];
      updateStats(sessions);
      renderSessions(sessions);
    } catch (err) {
      console.error("Failed to load sessions:", err);
    }
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  }

  function getMyRecord(session) {
    return session.records && session.records[0] ? session.records[0] : null;
  }

  function updateStats(sessions) {
    const marked = sessions.filter(s => getMyRecord(s)).length;
    const present = sessions.filter(s => getMyRecord(s)?.status === "PRESENT").length;
    const unmarked = sessions.filter(s => !getMyRecord(s)).length;

    document.getElementById('totalSessions').textContent = sessions.length;
    document.getElementById('markedCount').textContent = marked;
    document.getElementById('presentCount').textContent = present;
    document.getElementById('unmarkedCount').textContent = unmarked;
  }

  function getStatusBadge(record) {
    if (!record) return `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase bg-secondary-fixed text-on-secondary-fixed-variant">Not Marked</span>`;
    const map = {
      PENDING: "bg-primary-fixed text-on-primary-fixed-variant",
      PRESENT: "bg-green-100 text-green-700",
      ABSENT: "bg-error-container text-on-error-container",
      LATE: "bg-secondary-fixed text-on-secondary-fixed-variant",
    };
    const labels = { PENDING: "Pending Review", PRESENT: "Present ✓", ABSENT: "Absent", LATE: "Late" };
    return `<span class="px-3 py-1 rounded-full text-[11px] font-bold uppercase ${map[record.status]}">${labels[record.status]}</span>`;
  }

  function renderSessions(sessions) {
    const container = document.getElementById('sessionsList');
    if (!sessions.length) {
      container.innerHTML = `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant p-xl text-center">
          <p class="text-on-surface-variant font-body-sm">No attendance sessions available yet. Check back soon!</p>
        </div>`;
      return;
    }

    container.innerHTML = sessions.map(s => {
      const record = getMyRecord(s);
      const isPast = new Date(s.date) < new Date();
      const canMark = !record || record.status === "PENDING";

      return `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant p-lg">
          <div class="flex justify-between items-start mb-sm">
            <div>
              <h3 class="font-headline-sm text-headline-sm text-primary">${s.title}</h3>
              <p class="text-body-sm text-on-surface-variant">${formatDate(s.date)}</p>
              ${s.course ? `<p class="text-label-sm text-outline">${s.course} ${s.cohort ? '• ' + s.cohort : ''}</p>` : ''}
            </div>
            ${getStatusBadge(record)}
          </div>
          ${s.notes ? `<p class="text-body-sm text-on-surface-variant mb-md">${s.notes}</p>` : ''}
          ${record?.studentNote ? `<p class="text-label-sm text-on-surface-variant mb-sm">Your note: <span class="text-on-surface">${record.studentNote}</span></p>` : ''}
          ${record?.instructorNote ? `<p class="text-label-sm text-on-surface-variant mb-sm">Instructor note: <span class="text-on-surface">${record.instructorNote}</span></p>` : ''}
          ${canMark
            ? `<button onclick="openMarkModal('${s.id}', '${s.title}')" class="w-full mt-sm py-sm bg-primary text-on-primary rounded-xl font-label-md hover:opacity-90 transition-colors">
                ${record ? 'Update Note' : 'Mark Attendance'}
              </button>`
            : `<p class="text-label-sm text-on-surface-variant mt-sm text-center">Reviewed by instructor</p>`
          }
        </div>
      `;
    }).join("");
  }

  function openMarkModal(sessionId, title) {
    document.getElementById('markSessionId').value = sessionId;
    document.getElementById('markSessionTitle').textContent = title;
    document.getElementById('markNote').value = "";
    document.getElementById('markModal').classList.remove('hidden');
  }

  async function submitAttendance(e) {
    e.preventDefault();
    const sessionId = document.getElementById('markSessionId').value;
    const studentNote = document.getElementById('markNote').value;
    const btn = document.getElementById('markBtn');

    btn.disabled = true;
    btn.textContent = "Marking...";

    try {
      const res = await fetch(`${API_URL}/attendance/student/sessions/${sessionId}/mark`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ studentNote }),
      });
      if (res.ok) {
        document.getElementById('markModal').classList.add('hidden');
        loadSessions();
      } else {
        const data = await res.json();
        alert(data.message || "Failed to mark attendance");
      }
    } catch (err) {
      alert("Network error. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Mark Present";
    }
  }

  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem("kil_token");
    localStorage.removeItem("kil_user");
    window.location.href = "index.html";
  });

  const menuBtn = document.querySelector('header button');
  const sidebar = document.getElementById('main-sidebar');
  menuBtn?.addEventListener('click', () => {
    sidebar.classList.toggle('hidden');
    sidebar.classList.toggle('flex');
  });

  loadSessions();
</script>
</body></html>
